<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>El Grillo — Administración</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="sistema.css">
</head>
<body>

<!-- Header -->
<header class="sys-header">
  <a class="sys-header__logo" href="../index.html">El Grillo <span>· 1969</span></a>
  <div class="sys-header__center">
    <span class="sys-header__badge">Admin</span>
  </div>
  <div class="sys-header__actions">
    <button class="sys-btn" onclick="logout()">Salir</button>
  </div>
</header>

<!-- Date navigation -->
<div class="date-nav">
  <button class="date-nav__btn" onclick="prevDay()" aria-label="Día anterior">&#8592;</button>
  <button class="date-nav__today" onclick="goToday()">Hoy</button>
  <span class="date-nav__label" id="dateLabel"></span>
  <button class="date-nav__btn" onclick="nextDay()" aria-label="Día siguiente">&#8594;</button>
</div>

<!-- Stats strip (global) -->
<div class="stats-strip">
  <div class="stats-strip__item">
    <span class="stats-strip__num" id="statTotal">0</span>
    <span class="stats-strip__label">Total</span>
  </div>
  <div class="stats-strip__item">
    <span class="stats-strip__num stats-strip__num--accent" id="statPending">0</span>
    <span class="stats-strip__label">Pendientes</span>
  </div>
  <div class="stats-strip__item">
    <span class="stats-strip__num stats-strip__num--green" id="statConfirmed">0</span>
    <span class="stats-strip__label">Confirmados</span>
  </div>
  <div class="stats-strip__item">
    <span class="stats-strip__num stats-strip__num--muted" id="statCompleted">0</span>
    <span class="stats-strip__label">Completados</span>
  </div>
  <div class="stats-strip__item">
    <span class="stats-strip__num" id="statNoshow">0</span>
    <span class="stats-strip__label">No vinieron</span>
  </div>
</div>

<!-- Admin body: barber columns (desktop) / tab bar (mobile) -->
<div class="admin-body">
  <div class="barber-columns" id="barberColumns"></div>
</div>

<!-- Mobile tab bar -->
<div class="tab-bar" id="tabBar">
  <div class="tab-bar__inner" id="tabBarInner"></div>
</div>

<!-- Detail Modal -->
<div class="modal-backdrop" id="detailModal">
  <div class="modal">
    <div class="modal__header">
      <span class="modal__title">Detalle del turno</span>
      <button class="modal__close" onclick="closeModal('detailModal')">&#215;</button>
    </div>
    <div class="modal__body" id="detailBody"></div>
    <div class="modal__actions" id="detailActions"></div>
  </div>
</div>

<!-- New Appointment Modal -->
<div class="modal-backdrop" id="newModal">
  <div class="modal">
    <div class="modal__header">
      <span class="modal__title">Nuevo turno</span>
      <button class="modal__close" onclick="closeModal('newModal')">&#215;</button>
    </div>
    <div class="modal__body">
      <form class="sys-form" id="newForm">
        <div class="sys-field">
          <label class="sys-label" for="nBarber">Peluquero</label>
          <select class="sys-select" id="nBarber" required></select>
        </div>
        <div class="sys-row">
          <div class="sys-field">
            <label class="sys-label" for="nNombre">Nombre</label>
            <input class="sys-input" type="text" id="nNombre" placeholder="Cliente" required autocomplete="off">
          </div>
          <div class="sys-field">
            <label class="sys-label" for="nCelular">Celular</label>
            <input class="sys-input" type="tel" id="nCelular" placeholder="09X XXX XXX" autocomplete="off">
          </div>
        </div>
        <div class="sys-row">
          <div class="sys-field">
            <label class="sys-label" for="nFecha">Fecha</label>
            <input class="sys-input" type="date" id="nFecha" required>
          </div>
          <div class="sys-field">
            <label class="sys-label" for="nHora">Hora</label>
            <select class="sys-select" id="nHora" required>
              <option value="" disabled selected>Elegí</option>
            </select>
          </div>
        </div>
        <label class="sys-check">
          <input class="sys-check__input" type="checkbox" id="nWhatsapp">
          <span class="sys-check__label">Recordatorio por WhatsApp</span>
        </label>
      </form>
    </div>
    <div class="modal__actions">
      <button class="btn btn--primary btn--full" onclick="submitNew()">Guardar turno</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  GrilloData.requireAdmin();

  var currentDate   = GrilloData.todayStr();
  var activeTab     = GrilloData.getBarbers()[0].id;
  var isMobile      = window.innerWidth < 768;

  /* ── Date navigation ───────────────────────────────────────────────────── */
  function updateDateLabel() {
    var label = GrilloData.formatDateMedium(currentDate);
    if (currentDate === GrilloData.todayStr()) label += ' · Hoy';
    document.getElementById('dateLabel').textContent = label;
  }

  function prevDay() { currentDate = GrilloData.addDays(currentDate, -1); loadDay(); }
  function nextDay() { currentDate = GrilloData.addDays(currentDate,  1); loadDay(); }
  function goToday() { currentDate = GrilloData.todayStr(); loadDay(); }

  /* ── Global stats ──────────────────────────────────────────────────────── */
  function updateStats() {
    var s = GrilloData.getDayStats(currentDate);
    document.getElementById('statTotal').textContent     = s.total;
    document.getElementById('statPending').textContent   = s.pending;
    document.getElementById('statConfirmed').textContent = s.confirmed;
    document.getElementById('statCompleted').textContent = s.completed;
    document.getElementById('statNoshow').textContent    = s.noshow;
  }

  /* ── Badge HTML ────────────────────────────────────────────────────────── */
  function badgeHtml(status) {
    return '<span class="badge badge--' + status + '">' + (GrilloData.STATUS_LABELS[status] || status) + '</span>';
  }

  /* ── Build appointment card (compact, for admin columns) ───────────────── */
  function aptCardHtml(apt) {
    var classes = 'apt-card apt-card--compact apt-card--' + apt.status;
    return '<div class="' + classes + '" onclick="openDetail(\'' + apt.id + '\')">' +
      '<div class="apt-card__main">' +
        '<span class="apt-card__time">' + apt.time + '</span>' +
        '<div class="apt-card__info">' +
          '<p class="apt-card__name">' + apt.clientName + '</p>' +
          '<p class="apt-card__phone">' + (apt.clientPhone || '') + '</p>' +
        '</div>' +
        '<div class="apt-card__right">' + badgeHtml(apt.status) + '</div>' +
      '</div>' +
    '</div>';
  }

  /* ── Render columns (desktop) ──────────────────────────────────────────── */
  function renderColumns() {
    var barbers = GrilloData.getBarbers();
    var columns = document.getElementById('barberColumns');
    columns.innerHTML = barbers.map(function (b) {
      var apts  = GrilloData.getByBarberDate(b.id, currentDate);
      var photo = GrilloData.unsplashUrl(b.photoId, 120, 120);
      var cards = apts.length
        ? apts.map(aptCardHtml).join('')
        : '<div class="empty-state" style="padding:var(--space-12) var(--space-4)"><p class="empty-state__title" style="font-size:var(--text-base)">Sin turnos</p></div>';

      return '<div class="barber-column' + (isMobile && b.id !== activeTab ? ' hidden' : '') + '" id="col-' + b.id + '">' +
        '<div class="barber-col-header">' +
          '<img class="barber-col-photo" src="' + photo + '" alt="' + b.name + '" loading="lazy">' +
          '<div class="barber-col-info">' +
            '<p class="barber-col-name">' + b.name.split(' ')[0] + '</p>' +
            '<p class="barber-col-count">' + apts.length + ' turno' + (apts.length !== 1 ? 's' : '') + '</p>' +
          '</div>' +
        '</div>' +
        '<div class="barber-col-list">' + cards + '</div>' +
        '<button class="admin-add-btn" onclick="openNew(\'' + b.id + '\')">+ Agregar turno</button>' +
      '</div>';
    }).join('');
  }

  /* ── Tab bar (mobile) ──────────────────────────────────────────────────── */
  function buildTabBar() {
    var barbers = GrilloData.getBarbers();
    document.getElementById('tabBarInner').innerHTML = barbers.map(function (b) {
      var photo = GrilloData.unsplashUrl(b.photoId, 60, 60);
      return '<button class="tab-btn' + (b.id === activeTab ? ' active' : '') + '" onclick="selectTab(\'' + b.id + '\')">' +
        '<img class="tab-btn__photo" src="' + photo + '" alt="' + b.name + '">' +
        '<span class="tab-btn__name">' + b.name.split(' ')[0] + '</span>' +
      '</button>';
    }).join('');
  }

  function selectTab(id) {
    activeTab = id;
    document.querySelectorAll('.tab-btn').forEach(function (btn) {
      btn.classList.toggle('active', btn.textContent.trim().toLowerCase() ===
        GrilloData.getBarberById(id).name.split(' ')[0].toLowerCase());
    });
    /* Rebuild tab active classes */
    buildTabBar();
    document.querySelectorAll('.barber-column').forEach(function (col) {
      col.classList.toggle('hidden', !col.id.endsWith(id));
    });
  }

  /* ── Load day ──────────────────────────────────────────────────────────── */
  function loadDay() {
    updateDateLabel();
    updateStats();
    renderColumns();
    if (isMobile) buildTabBar();
  }

  /* ── Detail modal ──────────────────────────────────────────────────────── */
  function openDetail(id) {
    var all = GrilloData.getAll();
    var apt = all.find(function (a) { return a.id === id; });
    if (!apt) return;
    var barber = GrilloData.getBarberById(apt.barberId);

    document.getElementById('detailBody').innerHTML =
      '<div class="detail-row"><span class="detail-label">Cliente</span><span class="detail-value">' + apt.clientName + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Teléfono</span><span class="detail-value"><a href="tel:' + apt.clientPhone + '">' + (apt.clientPhone || '—') + '</a></span></div>' +
      '<div class="detail-row"><span class="detail-label">Fecha</span><span class="detail-value">' + GrilloData.formatDateMedium(apt.date) + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Hora</span><span class="detail-value">' + apt.time + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Peluquero</span><span class="detail-value">' + (barber ? barber.name : apt.barberId) + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Estado</span><span class="detail-value">' + badgeHtml(apt.status) + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">' + (apt.whatsapp ? 'Sí' : 'No') + '</span></div>';

    var actions = document.getElementById('detailActions');
    var btns = [];
    if (apt.status === 'pending')   btns.push(['Confirmar',  'confirmed', 'btn--primary']);
    if (apt.status !== 'completed') btns.push(['Completar',  'completed', 'btn--primary']);
    if (apt.status !== 'noshow')    btns.push(['No vino',    'noshow',    'btn--ghost']);
    if (apt.status !== 'cancelled') btns.push(['Cancelar',   'cancelled', 'btn--ghost']);

    actions.innerHTML = btns.map(function (b) {
      return '<button class="btn ' + b[2] + ' btn--full" onclick="detailStatus(\'' + id + '\',\'' + b[1] + '\')">' + b[0] + '</button>';
    }).join('') +
    '<button class="btn btn--ghost btn--full" style="color:var(--status-cancelled-fg);border-color:var(--status-cancelled-fg)" onclick="detailDelete(\'' + id + '\')">Eliminar turno</button>';

    document.getElementById('detailModal').classList.add('is-open');
  }

  function detailStatus(id, status) {
    GrilloData.updateStatus(id, status);
    closeModal('detailModal');
    loadDay();
  }

  function detailDelete(id) {
    if (!confirm('¿Eliminar este turno?')) return;
    GrilloData.deleteApt(id);
    closeModal('detailModal');
    loadDay();
  }

  /* ── New appointment modal ─────────────────────────────────────────────── */
  function buildBarberOptions(preselect) {
    var sel = document.getElementById('nBarber');
    sel.innerHTML = GrilloData.getBarbers().map(function (b) {
      return '<option value="' + b.id + '"' + (b.id === preselect ? ' selected' : '') + '>' + b.name + '</option>';
    }).join('');
  }

  function buildHoraOptions(isSat) {
    var sel  = document.getElementById('nHora');
    var maxH = isSat ? 13 : 19;
    sel.innerHTML = '<option value="" disabled selected>Elegí</option>';
    for (var h = 8; h <= maxH; h++) {
      ['00', '30'].forEach(function (m) {
        if (h === maxH && m === '30' && isSat) return;
        var val = String(h).padStart(2,'0') + ':' + m;
        sel.innerHTML += '<option value="' + val + '">' + val + '</option>';
      });
    }
  }

  function openNew(barberId) {
    buildBarberOptions(barberId || GrilloData.getBarbers()[0].id);
    document.getElementById('nNombre').value    = '';
    document.getElementById('nCelular').value   = '';
    document.getElementById('nFecha').value     = currentDate;
    document.getElementById('nWhatsapp').checked = false;
    buildHoraOptions(GrilloData.isSaturday(currentDate));
    document.getElementById('nHora').value = '';
    document.getElementById('newModal').classList.add('is-open');
    setTimeout(function () { document.getElementById('nNombre').focus(); }, 300);
  }

  document.getElementById('nFecha').addEventListener('change', function () {
    buildHoraOptions(GrilloData.isSaturday(this.value));
  });

  function submitNew() {
    var nombre  = document.getElementById('nNombre').value.trim();
    var barberId= document.getElementById('nBarber').value;
    var fecha   = document.getElementById('nFecha').value;
    var hora    = document.getElementById('nHora').value;
    if (!nombre || !barberId || !fecha || !hora) {
      alert('Completá todos los campos obligatorios.');
      return;
    }
    GrilloData.add({
      barberId:    barberId,
      clientName:  nombre,
      clientPhone: document.getElementById('nCelular').value.trim(),
      date:        fecha,
      time:        hora,
      whatsapp:    document.getElementById('nWhatsapp').checked
    });
    closeModal('newModal');
    if (fecha === currentDate) loadDay();
    else { currentDate = fecha; loadDay(); }
  }

  /* ── Shared modal helpers ──────────────────────────────────────────────── */
  function closeModal(id) {
    document.getElementById(id).classList.remove('is-open');
  }

  ['detailModal','newModal'].forEach(function (id) {
    document.getElementById(id).addEventListener('click', function (e) {
      if (e.target === this) closeModal(id);
    });
  });

  /* ── Logout ────────────────────────────────────────────────────────────── */
  function logout() {
    GrilloData.clearSession();
    window.location.href = 'login.html';
  }

  /* ── Responsive resize ─────────────────────────────────────────────────── */
  window.addEventListener('resize', function () {
    var wasMobile = isMobile;
    isMobile = window.innerWidth < 768;
    if (wasMobile !== isMobile) loadDay();
  });

  /* ── Init ──────────────────────────────────────────────────────────────── */
  buildTabBar();
  loadDay();
</script>
</body>
</html>
